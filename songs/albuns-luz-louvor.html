function toggleSidebar(){
  if(window.innerWidth <= 900){
    document.body.classList.toggle("mobile-menu-open");
  }else{
    document.body.classList.toggle("sidebar-collapsed");
  }
}

function setLanguage(lang){
  currentLang = lang;
  document.documentElement.lang = lang === "pt" ? "pt-BR" : "en";

  document.getElementById("ptBtn").classList.toggle("active", lang === "pt");
  document.getElementById("enBtn").classList.toggle("active", lang === "en");

  document.querySelectorAll("[data-pt][data-en]").forEach(el => {
    el.textContent = el.dataset[lang];
  });

  localStorage.setItem("horizonLanguage", lang);
  renderSection(sections[currentSection]);
}

function loadSection(button){
  document.querySelectorAll(".nav button").forEach(btn=>btn.classList.remove("active"));
  button.classList.add("active");
  currentSection = button.dataset.section;
  renderSection(sections[currentSection]);

  if(window.innerWidth <= 900){
    document.body.classList.remove("mobile-menu-open");
  }
}

function renderSection(data){
  const page = data.page[currentLang] || data.page.en || data.page.pt;

  document.getElementById("heroEyebrow").textContent = page.eyebrow;
  document.getElementById("heroTitle").textContent = page.title;
  document.getElementById("heroText").textContent = page.text;
  document.getElementById("sectionTitle").textContent = page.section;

  const gallery = document.getElementById("gallery");
  const platformRow = document.getElementById("platformRow");

  gallery.innerHTML = "";
  platformRow.innerHTML = "";

  if(data.platforms){
    document.getElementById("counter").textContent = data.platforms.length + " links";
    gallery.style.display = "none";
    platformRow.style.display = "grid";

    data.platforms.forEach(platform=>{
      const a = document.createElement("a");
      a.className = "platform";
      a.href = platform.url || "#";
      a.target = "_blank";
      a.innerHTML = `
        <strong>${platform.title}</strong>
        <span>${platform.text}</span>
      `;
      platformRow.appendChild(a);
    });

    return;
  }

  const items = data.items || [];
  document.getElementById("counter").textContent = items.length + " items";
  gallery.style.display = "grid";
  platformRow.style.display = "none";

  items.forEach(item=>{
    const localized = item[currentLang] || item.en || item.pt || item;
    const status = item.status || "online";

    const card = document.createElement("article");
    card.className = "card " + status;

    if(status !== "coming-soon" && item.url){
      card.onclick = ()=>{
        window.location.href = item.url;
      };
    }else{
      card.style.cursor = "default";
    }

    card.innerHTML = `
           
      <div class="player-frame">
         
        <iframe id="youtubePlayer" style="border-radius:12px" src="https://open.spotify.com/embed/track/${item.image || ''}"
        title="Luz e Louvor Player"   frameBorder="0" allowfullscreen="" 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
      </iframe>
    </div>
      
    <div class="card-body">
        <div class="code" style="display:none;">${item.code || "LUZ E LOUVOR"}</div>
        <h2>${localized.title || item.title || "Untitled"}</h2>
        <p  style="display:none;">${localized.description || item.description || ""}</p>

        <div  style="display:none;" class="status ${status}">
          ${status === "coming-soon" ? "COMING SOON" : status === "online" ? "ONLINE" : status.toUpperCase()}
        </div>
      </div>
    `;

    gallery.appendChild(card);
  });
}

window.addEventListener("resize",()=>{
  if(window.innerWidth <= 900){
    document.body.classList.add("sidebar-collapsed");
  }
});

document.addEventListener("DOMContentLoaded",()=>{
  setLanguage(currentLang);
  renderSection(sections.albums);
});

function loadAlbum(videoId){
  const player = document.getElementById("youtubePlayer");
  player.src = `https://www.youtube.com/embed/${videoId}?rel=0`;
}
