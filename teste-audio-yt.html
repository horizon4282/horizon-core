<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Playlist Musical</title>
    <style>
        /* Estilização moderna e centralizada */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 560px; /* Largura ideal para o player */
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        .player-title {
            font-size: 1.25rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Container que mantém a proporção perfeita do player */
        .responsive-iframe {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 56.25%; /* Proporção padrão 16:9 */
            border-radius: 10px;
            background-color: #000;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-title">Minha Música Favorita</div>
        
        <div class="responsive-iframe">
            <!-- URL corrigida com o seu ID oficial: OLAK5uy_lGrOpeRVw7kWQ5FgZGJUFDqe4tRMUh_KQ -->
         <iframe data-testid="embed-iframe" style="border-radius:12px"
             src="https://open.spotify.com/embed/track/3hFyAO235ZwVZUaPwOcCVJ?utm_source=generator&si=deec38cd192c4ac7" 
             width="100%" height="352" frameBorder="0" allowfullscreen="" 
             allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
         </iframe>
        </div>
    </div>

</body>
</html>
