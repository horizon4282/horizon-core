<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Playlist no Site</title>
    <style>
        /* Estilos básicos para centralizar e ajustar o layout */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 560px; /* Largura máxima ideal para o player */
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .player-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* Container responsivo para manter a proporção do vídeo/player */
        .responsive-iframe {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 56.25%; /* Proporção de tela 16:9 */
            border-radius: 8px;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-title">Minha Playlist Favorita</div>
        
        <!-- Bloco do Player Convertido do YouTube Music -->
        <div class="responsive-iframe">
            <iframe 
                src="https://youtube.com" 
                title="Player de Música incorporado" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
