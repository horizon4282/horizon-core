    .language-switch{

    }

    .category-list{

      gap:12px;

    }

      color:#d5ecff;
      padding:15px;
      text-align:left;
      cursor:pointer;
      font-family:"Courier New", monospace;
      letter-spacing:2px;
      transition:.25s ease;
    }

    .category-btn:hover,
    .category-btn.active{
      border-color:rgba(127,211,255,.6);
      background:rgba(127,211,255,.08);
      transform:translateX(4px);
    }

    main{
      min-width:0;
    }

      background-color: #132445cb;

      letter-spacing:7px;
      margin-bottom:20px;
      color:#fff;
    }

      line-height:1.7;
      font-size:17px;
    }

      background:rgba(255,255,255,.025);
    }

      font-size:28px;
      margin-bottom:12px;
      color:#fff;
    }

    .category-heading p{
      color:#a9cfff;
      line-height:1.6;

    .cards{

      min-height:210px;

      box-shadow:0 0 25px rgba(127,211,255,.16);

      content:"";
      position:absolute;

      height:90px;
      background:rgba(127,211,255,.06);

    function setLanguage(lang){
      document.querySelectorAll("[data-lang]").forEach(block => {
        block.style.display = "none";
      });

      document.querySelectorAll(`[data-lang="${lang}"]`).forEach(block => {
        block.style.display = "block";
      });

      localStorage.setItem("horizonLanguage", lang);
      document.documentElement.lang = lang === "pt" ? "pt-BR" : "en";

      showCategory("fantastic");
    }

    function showCategory(key, btn){
      const category = categories[key];

      if(!category) return;

      const lang = localStorage.getItem("horizonLanguage") || "pt";

      const title = document.getElementById(lang === "pt" ? "categoryTitlePt" : "categoryTitleEn");
      const desc = document.getElementById(lang === "pt" ? "categoryDescPt" : "categoryDescEn");
      const cards = document.getElementById(lang === "pt" ? "cardsPt" : "cardsEn");

      title.textContent = lang === "pt" ? category.ptTitle : category.enTitle;
      desc.textContent = lang === "pt" ? category.ptDesc : category.enDesc;

      cards.innerHTML = "";

      category.items.forEach(item => {
        const card = document.createElement("a");
        card.className = "card";
        card.href = item.url;

        card.innerHTML = `
          <div class="card-type">${item.type}</div>
          <div class="card-title">${item.title}</div>
          <div class="card-title"><img src="${item.image}" width="100%" /></div>
          <div class="card-desc">${lang === "pt" ? item.descPt : item.descEn}</div>
          <div class="card-status">${item.status}</div>
        `;
      
        cards.appendChild(card);
        comingSoon();
        
      });
 

  document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));

      if(btn){
        const text = btn.textContent.trim();

        document.querySelectorAll(".category-btn").forEach(b => {
          if(b.textContent.trim() === text){
            b.classList.add("active");      
         }
        });
      }
    }

         
function comingSoon (){
      document.querySelectorAll(".card-status").forEach((b,i) => {
        if(b.textContent.trim() === "COMING SOON"){
        document.querySelectorAll(".card")[i].style.opacity = "0.6"
        document.querySelectorAll(".card")[i].style.filter ="grayscale(80)"
        document.querySelectorAll(".card")[i].style.cursor ="default"
       }
        })

  }

    const savedLanguage = localStorage.getItem("horizonLanguage") || "pt";
    setLanguage(savedLanguage);
    comingSoon();
