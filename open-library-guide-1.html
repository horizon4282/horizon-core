<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Open Library | Horizon 4282</title>

  <meta name="description" content="Open Library Horizon 4282 — portal de leitura, graphic novels, museus digitais, música, cursos e experiências criativas." />
  <meta name="author" content="Roque Fernando M. Sousa" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#030712" />

  <style>
    :root {
      --bg: #030712;
      --bg-soft: #07111f;
      --panel: rgba(15, 31, 54, 0.72);
      --panel-strong: rgba(20, 52, 82, 0.88);
      --line: rgba(96, 165, 250, 0.22);
      --line-strong: rgba(125, 211, 252, 0.45);
      --text: #eef6ff;
      --muted: #8ca3bd;
      --accent: #7dd3fc;
      --gold: #f5b740;
      --cyan: #00f2ff;
      --sidebar-open: 315px;
      --sidebar-closed: 82px;
      --radius: 0px;
      --font-main: "Courier New", Courier, monospace;
      --font-title: "Courier New", Courier, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.12), transparent 34%),
        radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.08), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-main);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.20) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.035), rgba(0, 255, 255, 0.018), rgba(0, 0, 255, 0.035));
      background-size: 100% 3px, 3px 100%;
      z-index: 999;
      opacity: .55;
    }

    body.sidebar-collapsed {
      --sidebar-width: var(--sidebar-closed);
    }

    body:not(.sidebar-collapsed) {
      --sidebar-width: var(--sidebar-open);
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-width);
      background: rgba(3, 7, 18, 0.94);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
      z-index: 50;
      transition: width .25s ease, transform .25s ease;
      overflow: hidden;
    }

    .sidebar-header {
      height: 78px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .toggle-btn {
      min-width: 44px;
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      background: rgba(8, 21, 38, .78);
      color: var(--accent);
      cursor: pointer;
      font-size: 18px;
      font-family: var(--font-main);
    }

    .toggle-btn:hover {
      border-color: var(--line-strong);
      color: #fff;
    }

    .brand {
      white-space: nowrap;
      overflow: hidden;
    }

    .brand strong {
      display: block;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    body.sidebar-collapsed .brand,
    body.sidebar-collapsed .nav span,
    body.sidebar-collapsed .sidebar-footer,
    body.sidebar-collapsed .sidebar-label {
      display: none;
    }

    .nav {
      padding: 18px 12px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .sidebar-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      margin: 12px 10px 10px;
    }

    .nav button,
    .nav a {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 48px;
      padding: 0 14px;
      margin-bottom: 8px;
      border: 1px solid rgba(125, 211, 252, 0.14);
      background: rgba(8, 21, 38, 0.45);
      color: var(--text);
      text-decoration: none;
      transition: .2s;
      white-space: nowrap;
      font-family: var(--font-main);
      cursor: pointer;
      text-align: left;
      letter-spacing: .13em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .nav button:hover,
    .nav button.active,
    .nav a:hover {
      background: rgba(8, 80, 102, 0.52);
      border-color: var(--line-strong);
      color: var(--gold);
    }

    .nav i {
      width: 22px;
      text-align: center;
      font-style: normal;
      color: var(--accent);
    }

    .sidebar-footer {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 22px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .mobile-topbar {
      display: none;
    }

    .main {
      width: 100%;
      margin-left: var(--sidebar-width);
      transition: margin-left .25s ease;
    }

    .content {
      width: min(1360px, calc(100% - 48px));
      margin: 0 auto;
      padding: 34px 0 80px;
    }

    .top-mini {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
      gap: 16px;
    }

    .lang-switch {
      display: flex;
      gap: 10px;
    }

    .lang-switch button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--accent);
      padding: 10px 16px;
      cursor: pointer;
      font-family: var(--font-main);
      letter-spacing: .16em;
    }

    .lang-switch button.active {
      background: rgba(14, 165, 233, 0.13);
      color: #fff;
    }

    .home-link {
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .18em;
      font-size: 11px;
      text-transform: uppercase;
    }

  .layout {
  display: grid;
  grid-template-columns: 1fr;
}

    .poster-panel {
      border: 1px solid var(--line);
      background: rgba(8, 21, 38, .52);
      min-height: 660px;
      position: sticky;
      top: 34px;
      overflow: hidden;
      display:none;
    }

    .poster-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,.55)),
        var(--poster-image, linear-gradient(135deg, rgba(14, 165, 233, .18), rgba(0,0,0,.2)));
      background-size: cover;
      background-position: center;
      opacity: .84;
      filter: contrast(1.1) saturate(.85);
    }

    .poster-mark {
      position: absolute;
      left: 28px;
      bottom: 26px;
      right: 28px;
      color: #dff6ff;
      z-index: 1;
    }

    .poster-mark strong {
      display: block;
      font-size: 13px;
      letter-spacing: .42em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .poster-mark span {
      display: block;
      color: var(--muted);
      line-height: 1.5;
      font-size: 12px;
    }

    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      background: rgba(8, 21, 38, .62);
      margin-bottom: 24px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: .26em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      font-family: var(--font-title);
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      margin: 0 0 16px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .hero p {
      max-width: 850px;
      color: #b4c7df;
      font-size: 17px;
      line-height: 1.7;
      margin: 0;
    }

    .section-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 26px 0 18px;
      gap: 16px;
    }

    .section-title {
      font-size: 13px;
      color: var(--accent);
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .counter {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(15, 31, 54, 0.72);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
      min-height: 430px;
    }

    .card:hover {
      transform: translateY(-4px);
      background: rgba(20, 52, 82, 0.82);
      border-color: var(--line-strong);
    }

    .art-image {
      aspect-ratio: 4 / 5;
      background:
        linear-gradient(135deg, rgba(14, 165, 233,.18), rgba(8, 21, 38,.35)),
        #111827;
      background-size: 80%;
      background-position: center;
      background-repeat:no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.45);
      font-size: 20px;
    }

    .card-body {
      padding: 18px;
    }

    .code {
      color: var(--gold);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card h2 {
      font-size: 21px;
      font-weight: 500;
      margin: 0 0 12px;
      line-height: 1.25;
      color: var(--text);
    }

    .card p {
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
      font-size: 14px;
    }

    .loading {
      border: 1px solid var(--line);
      background: rgba(8, 21, 38, .52);
      padding: 30px;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .error-box {
      border: 1px solid rgba(244, 63, 94, .35);
      background: rgba(244, 63, 94, .08);
      color: #fecdd3;
      padding: 20px;
      line-height: 1.6;
      font-size: 14px;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .poster-panel {
        position: relative;
        min-height: 320px;
        top: auto;
      }

      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      body {
        --sidebar-width: var(--sidebar-open);
      }

      .sidebar {
        transform: translateX(-100%);
        width: 315px;
      }

      body.mobile-menu-open .sidebar {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
      }

      .mobile-topbar {
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(3,7,18,.9);
        backdrop-filter: blur(18px);
        position: sticky;
        top: 0;
        z-index: 40;
      }

      .content {
        width: min(100% - 28px, 760px);
        padding-top: 26px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="sidebar-collapsed">
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        <div class="brand">
          <strong>Horizon 4282</strong>
          <span>Free Content Portal</span>
        </div>
      </div>

      <nav class="nav">
        <a href="/"><i>⌂</i><span>Home</span></a>

        <div class="sidebar-label">Open Library</div>

        <button class="active" data-json="/data/fantastic-reading.json" onclick="loadGallery(this)">
          <i>✦</i><span>Fantastic Reading</span>
        </button>

        <button data-json="/data/open-library/graphic-novel.json" onclick="loadGallery(this)">
          <i>▧</i><span>Graphic Novel</span>
        </button>

        <button data-json="/data/open-library/pray-music.json" onclick="loadGallery(this)">
          <i>♫</i><span>Pray Music</span>
        </button>

        <button data-json="/data/open-library/culture-music.json" onclick="loadGallery(this)">
          <i>♬</i><span>Culture Music</span>
        </button>

        <button data-json="/data/open-library/deep-mind-ai.json" onclick="loadGallery(this)">
          <i>◎</i><span>Deep Mind AI</span>
        </button>

        <button data-json="/data/open-library/courses.json" onclick="loadGallery(this)">
          <i>▤</i><span>Courses</span>
        </button>

        <button data-json="/data/open-library/human-aspects.json" onclick="loadGallery(this)">
          <i>◌</i><span>Human Aspects</span>
        </button>

        <button data-json="/data/open-library/pray-reader.json" onclick="loadGallery(this)">
          <i>✚</i><span>Pray Reader</span>
        </button>

        <button data-json="/data/open-library/comic-pray-kids.json" onclick="loadGallery(this)">
          <i>☼</i><span>Comic Pray Kids</span>
        </button>

        <button data-json="/data/open-library/games.json" onclick="loadGallery(this)">
          <i>▣</i><span>Games</span>
        </button>

        <button data-json="/data/open-library/utils.json" onclick="loadGallery(this)">
          <i>⚙</i><span>Utils</span>
        </button>

        <button data-json="/data/open-library/digital-museum-horizon.json" onclick="loadGallery(this)">
          <i>◇</i><span>Digital Museum Horizon</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        Horizon 4282<br />
        Human + AI Creative Archive
      </div>
    </aside>

    <main class="main">
      <header class="mobile-topbar">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        <div style="text-align:right">
          <strong style="display:block;font-size:14px;letter-spacing:.08em;text-transform:uppercase">Horizon 4282</strong>
          <span style="color:var(--muted);font-size:12px">Open Library</span>
        </div>
      </header>

      <section class="content">
        <div class="top-mini">
          <div class="lang-switch">
            <button id="ptBtn" onclick="setLanguage('pt')">PT</button>
            <button id="enBtn" class="active" onclick="setLanguage('en')">EN</button>
          </div>

          <a class="home-link" href="/">Home</a>
        </div>

        <div class="layout">
          <aside class="poster-panel" id="posterPanel">
            <div class="poster-mark">
              <strong>Horizon 4282</strong>
              <span>Free content portal • open library • experimental archive.</span>
            </div>
          </aside>

          <section>
            <div class="hero">
              <div class="eyebrow" id="heroEyebrow">Open Library</div>
              <h1 id="heroTitle">Loading...</h1>
              <p id="heroText">Loading gallery data...</p>
            </div>

            <div class="section-bar">
              <div class="section-title" id="sectionTitle">Gallery</div>
              <div class="counter" id="counter">0 items</div>
            </div>

            <div id="galleryState" class="loading">Loading selected JSON...</div>
            <div class="gallery" id="gallery"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    let currentLang = "en";
    let currentData = null;

    const fallbackData = {
      page: {
        pt: {
          eyebrow: "Open Library",
          title: "Fantastic Reading",
          text: "Narrativas ficcionais, universos alternativos e histórias especulativas.",
          section: "Acervo"
        },
        en: {
          eyebrow: "Open Library",
          title: "Fantastic Reading",
          text: "Fictional narratives, alternate universes and speculative stories.",
          section: "Gallery"
        }
      },
      poster: "https://f005.backblazeb2.com/file/horizon4282/open-library/the-vault-poster.jpg",
      items: [
        {
          code: "OPEN LIBRARY",
          image: "https://f005.backblazeb2.com/file/horizon4282/open-library/the-vault-cover.jpg",
          url: "/open-library/the-vault.html",
          pt: {
            title: "The Vault",
            description: "Uma narrativa de ficção dentro do universo Horizon 4282."
          },
          en: {
            title: "The Vault",
            description: "A fictional narrative inside the Horizon 4282 universe."
          }
        },
        {
          code: "FICTION",
          image: "https://f005.backblazeb2.com/file/horizon4282/open-library/coming-soon.jpg",
          url: "/open-library/master-wave.html",
          pt: {
            title: "Master Wave",
            description: "Uma narrativa de ficção científica em desenvolvimento."
          },
          en: {
            title: "Master Wave",
            description: "A science fiction narrative currently in development."
          }
        },
        {
          code: "FICTION",
          image: "https://f005.backblazeb2.com/file/horizon4282/open-library/coming-soon.jpg",
          url: "/open-library/rem.html",
          pt: {
            title: "REM",
            description: "Uma história sobre memória, sonho e realidade."
          },
          en: {
            title: "REM",
            description: "A story about memory, dream and reality."
          }
        }
      ]
    };

    function toggleSidebar() {
      if (window.innerWidth <= 900) {
        document.body.classList.toggle("mobile-menu-open");
      } else {
        document.body.classList.toggle("sidebar-collapsed");
      }
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang === "pt" ? "pt-BR" : "en";
      document.getElementById("ptBtn").classList.toggle("active", lang === "pt");
      document.getElementById("enBtn").classList.toggle("active", lang === "en");
      if (currentData) renderPage(currentData);
    }

    async function loadGallery(button) {
      document.querySelectorAll(".nav button").forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");

      const jsonUrl = button.dataset.json;
      document.getElementById("galleryState").className = "loading";
      document.getElementById("galleryState").style.display = "block";
      document.getElementById("galleryState").textContent = "Loading JSON: " + jsonUrl;
      document.getElementById("gallery").innerHTML = "";

      try {
        const response = await fetch(jsonUrl);
        if (!response.ok) throw new Error("JSON not found");
        const data = await response.json();
        currentData = normalizeData(data);
        renderPage(currentData);
      } catch (error) {
        currentData = fallbackData;
        renderPage(currentData);
        document.getElementById("galleryState").className = "error-box";
        document.getElementById("galleryState").style.display = "block";
        document.getElementById("galleryState").innerHTML =
          "Não consegui carregar o JSON externo.<br>" +
          "Usando dados de exemplo embutidos.<br><br>" +
          "Arquivo esperado: <strong>" + jsonUrl + "</strong>";
      }

      if (window.innerWidth <= 900) {
        document.body.classList.remove("mobile-menu-open");
      }
    }

    function normalizeData(data) {
      return {
        page: data.page || fallbackData.page,
        poster: data.poster || fallbackData.poster,
        items: data.items || data.artworks || data.gallery || []
      };
    }

    function renderPage(data) {
      const page = data.page[currentLang] || data.page.en || data.page.pt || fallbackData.page.en;

      document.getElementById("heroEyebrow").textContent = page.eyebrow || "Open Library";
      document.getElementById("heroTitle").textContent = page.title || "Open Library";
      document.getElementById("heroText").textContent = page.text || page.description || "";
      document.getElementById("sectionTitle").textContent = page.section || "Gallery";

      const poster = data.poster || fallbackData.poster;
      document.getElementById("posterPanel").style.setProperty("--poster-image", "url('" + poster + "')");

      const gallery = document.getElementById("gallery");
      const state = document.getElementById("galleryState");
      gallery.innerHTML = "";

      const items = data.items || [];
      document.getElementById("counter").textContent = items.length + " items";

      if (!items.length) {
        state.className = "error-box";
        state.style.display = "block";
        state.textContent = "This JSON was loaded, but it has no items.";
        return;
      }

      state.style.display = "none";

      items.forEach(item => {
        const localized = item[currentLang] || item.en || item.pt || item;

        const card = document.createElement("article");
        card.className = "card";
        card.onclick = () => {
          if (item.url) {
            window.location.href = item.url;
          }
        };

        card.innerHTML = `
          <div class="art-image" style="background-image:url('${item.image || ""}')"></div>
          <div class="card-body">
            <div class="code">${item.code || item.category || "HORIZON"}</div>
            <h2>${localized.title || item.title || "Untitled"}</h2>
            <p>${localized.description || item.description || ""}</p>
          </div>
        `;

        gallery.appendChild(card);
      });
    }

    window.addEventListener("resize", () => {
      if (window.innerWidth <= 900) {
        document.body.classList.add("sidebar-collapsed");
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      const firstButton = document.querySelector(".nav button");
      if (firstButton) loadGallery(firstButton);
    });
  </script>
</body>
</html>
