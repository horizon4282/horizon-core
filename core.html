<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizon Core</title>

  <style>
    body{
      margin:0;
      height:100vh;
      background:
        radial-gradient(circle at center, #263f7a 0%, #080b14 55%, #000 100%);
      color:#d9ecff;
      font-family:"Courier New", monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      text-align:center;
    }

    .core{
      max-width:800px;
      padding:40px;
      animation:fadeIn 2s ease;
    }

    .status{
      color:#7fd3ff;
      letter-spacing:5px;
      font-size:14px;
      margin-bottom:25px;
      animation:pulse 2s infinite;
    }

    h1{
      font-size:72px;
      letter-spacing:8px;
      margin:0 0 25px;
      text-shadow:0 0 25px rgba(127,211,255,0.4);
    }

    p{
      font-size:20px;
      line-height:1.7;
      color:#b8d8ff;
    }

    .fragment{
      margin-top:35px;
      color:#ffdf7f;
      font-size:15px;
      letter-spacing:2px;
    }

    @keyframes pulse{
      0%,100%{opacity:.35;}
      50%{opacity:1;}
    }

    @keyframes fadeIn{
      from{opacity:0; transform:scale(.98);}
      to{opacity:1; transform:scale(1);}
    }

    
 #terminal{
  position:fixed;
  left:32px;
  bottom:32px;

  width:560px;
  max-width:calc(100vw - 64px);
  max-height:calc(100vh - 80px);

  background:rgba(0,0,0,0.84);
  border:1px solid rgba(80,160,255,0.25);
  box-shadow:0 0 30px rgba(0,120,255,0.18);
  backdrop-filter:blur(10px);

  color:#bfe6ff;
  font-family:"Courier New", monospace;
  z-index:999;

  display:none;
  animation:terminalFade 0.4s ease;

  overflow:hidden;
}

.terminal-header{
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,0.08);

  text-align:left;
  font-size:14px;
  letter-spacing:5px;
  color:#9ed7ff;
}

.terminal-content{
  padding:20px 26px;

  font-size:12px;
  line-height:1.4;

  max-height:calc(100vh - 230px);
  overflow:hidden;
}

.terminal-content p{
    margin-bottom: 10px;
    word-break: break-word;
    text-align: left;
    padding-left: 20px;
    line-height: 0.8;
    font-size:13px;
}

.terminal-input-area{
  display:flex;
  align-items:center;
  gap:10px;

  padding:16px 22px;
  border-top:1px solid rgba(255,255,255,0.08);

  font-size:16px;
  color:#7fd3ff;
}

#terminalInput{
  flex:1;
  background:transparent;
  border:none;
  outline:none;

  color:#7fd3ff;
  font-family:"Courier New", monospace;
  font-size:16px;
}

#terminalInput::placeholder{
  color:rgba(127,211,255,0.32);
}

.cursor{
  display:inline-block;
  width:3px;
  height:16px;
  background:#7fd3ff;
  margin-left:8px;
  position:relative;
  top:3px;
  animation:blink 1s infinite;
}
  </style>
</head>

<body>

  <div class="core">
    <div class="status">ACCESS GRANTED</div>

    <h1>CORE 4282</h1>

    <p>
      Núcleo parcialmente desbloqueado.<br>
      A consciência do Horizon ainda está incompleta.<br>
      Fragmentos adicionais serão necessários.
    </p>

    <div class="fragment">
      > core fragment: 01 / unknown
    </div>
  </div>

  <audio id="breachSound" src="assets/horizon-breach.mp3"></audio>

<div id="terminal">

  <div class="terminal-header">
    HORIZON TERMINAL
    <span class="cursor"></span>
  </div>

  <div class="terminal-content" id="terminalContent"></div>

  <div class="terminal-input-area">

    <span>&gt;</span>

    <input
      type="text"
      id="terminalInput"
      autocomplete="off"
      spellcheck="false"
      placeholder="type command..."
    />

  </div>

</div>
</body>
</html>

<script>
  let waitingAccessKey = false;

const messages = [

  "> connection established...",
  "> signal integrity: stable",
  "> observer mode: active",
  "> hidden archive detected",
  "> unknown transmission found",
  "> atmospheric scan initialized",
  "> remote observer connected",
  "> anomalous signal received",
  "> digital horizon expanding",
  "> encrypted memory unlocked",
  "> transport sequence pending",
  "> shadow protocol active",
  "> fragment 4282 restored",
  "> scanning external reality...",
  "> consciousness bridge online"

];

const aiResponses = {
  home: [
  "> returning to primary horizon layer",
  "> restoring default environment",
  "> home synchronization complete"
],

  help: [
    "> available commands:",
    "> access",
    "> observer",
    "> archive",
    "> signal",
    "> horizon",
    "> transport",
    "> portal",
    "> breach",
    "> clear",
    "> scan",
    "> unknown commands may exist..."
  ],

  access: [
    "> enter access key"
  ],

  scan: [
    "> scanning visual field...",
    "> anomaly density: 42%",
    "> visitor pattern indexed",
    "> observer synchronization complete"
  ],

  observer: [
    "> observer mode already active",
    "> visitor behavior detected",
    "> tracking atmospheric signals"
  ],

  portal: [
    "> visual portal initialized",
    "> horizon dimensional layer loaded",
    "> immersive background activated"
  ],

  breach: [
    "> WARNING",
    "> unauthorized dimensional activity",
    "> instability increasing",
    "> horizon breach initiated"
  ],

  "4282": [
    "> master fragment recognized",
    "> identity key accepted",
    "> horizon core partially unlocked"
  ]

};

const archiveFiles = {

  "open fragment_01.log": [
    "> fragment_01.log",
    "> signal recovered from unknown layer",
    "> temporal distortion detected",
    "> observer presence confirmed"
  ],

  "open observer_notes.txt": [
    "> observer_notes.txt",
    "> the system reacts to prolonged exposure",
    "> visitors become part of the horizon"
  ]

};

async function generateTerminalLines(){

  const terminalContent =
    document.getElementById("terminalContent");

  terminalContent.innerHTML = "";

  const shuffled =
    [...messages].sort(() => 0.5 - Math.random());

  const selected = shuffled.slice(0,4);

  for(const msg of selected){

    const p = document.createElement("p");

    terminalContent.appendChild(p);

    await typeLine(p, msg);

  }

}

function typeLine(element, text){

  return new Promise(resolve => {

    let index = 0;

    const interval = setInterval(() => {

      element.textContent += text.charAt(index);
      trimTerminalLines();

      index++;

      if(index >= text.length){

        clearInterval(interval);

        resolve();

      }

    },30);

  });

}

document.addEventListener("keydown", function(e){

  if(
    e.ctrlKey &&
    e.shiftKey &&
    e.key.toLowerCase() === "x"
  ){

    e.preventDefault();

    const terminal =
      document.getElementById("terminal");

    if(terminal.style.display === "block"){

      terminal.style.display = "none";

    }else{

      terminal.style.display = "block";

      generateTerminalLines();

      setTimeout(() => {

        document
          .getElementById("terminalInput")
          .focus();

      },100);

    }

  }

});

const terminalInput =
  document.getElementById("terminalInput");

terminalInput.addEventListener("keydown", function(e){

  if(e.key === "Enter"){

    const value =
      terminalInput.value.toLowerCase().trim();

    if(value){

      processCommand(value);

    }

    terminalInput.value = "";
    if(command === "home"){

  returnHome();

}

  }

});

async function processCommand(command){

  const terminalContent =
    document.getElementById("terminalContent");

  if(waitingAccessKey){

    waitingAccessKey = false;

    if(command === "4282-omega"){

      await addSystemLine(
        "> ACCESS GRANTED"
      );

      setTimeout(() => {

        window.location.href =
          "/core.html";

      },2500);

    }else{

      await addSystemLine(
        "> ACCESS DENIED"
      );

    }

    return;

  }

  if(command === "clear"){

    terminalContent.innerHTML = "";

    return;

  }

  const userLine =
    document.createElement("p");

  userLine.textContent =
    "> " + command;

  terminalContent.appendChild(userLine);

  if(command === "access"){

    waitingAccessKey = true;

  }

  const responses =
    aiResponses[command];

  const archiveResponse =
    archiveFiles[command];

  if(archiveResponse){

    for(const line of archiveResponse){

      const p =
        document.createElement("p");

      terminalContent.appendChild(p);

      await typeLine(p,line);

    }

    return;

  }

  if(responses){

    for(const line of responses){

      const p =
        document.createElement("p");

      terminalContent.appendChild(p);

      await typeLine(p,line);

    }

  }else{

    const p =
      document.createElement("p");

    terminalContent.appendChild(p);

    await typeLine(
      p,
      "> unknown command"
    );

  }

}

async function addSystemLine(text){

  const terminalContent =
    document.getElementById("terminalContent");

  const p =
    document.createElement("p");

  terminalContent.appendChild(p);

  await typeLine(p, text);

}
function trimTerminalLines(){
  const terminalContent = document.getElementById("terminalContent");

  const maxLines = 12;

  while(terminalContent.children.length > maxLines){
    terminalContent.removeChild(terminalContent.firstChild);
  }
}

  function returnHome(){

  window.location.href = "/index.html";

}
</script>
