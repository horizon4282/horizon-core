<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizon 4282</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:radial-gradient(circle at center,#132445 0%,#09101f 55%,#000 100%);
      font-family:Arial, Helvetica, sans-serif;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    #portalBg{
      position:fixed;
      inset:-6%;
      z-index:0;
      opacity:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.72)),
        url('assets/escararia-da-latencia.png');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      transform-origin:center center;
      transition:opacity 1.2s ease;
      will-change:transform, filter;
    }

    body.portal #portalBg{
      opacity:1;
      animation:portalFloat 18s ease-in-out infinite alternate;
    }

    @keyframes portalFloat{
      0%{
        transform:scale(1) translate3d(0,0,0);
        filter:brightness(0.9) contrast(1.05);
      }
      50%{
        transform:scale(1.06) translate3d(-22px,12px,0);
        filter:brightness(1.05) contrast(1.14);
      }
      100%{
        transform:scale(1.12) translate3d(20px,-14px,0);
        filter:brightness(0.94) contrast(1.1);
      }
    }

    canvas{
      position:absolute;
      inset:0;
      z-index:10;
    }

    .noise{
      position:absolute;
      inset:0;
      z-index:10;
      background-image:
        repeating-radial-gradient(
          circle at center,
          rgba(255,255,255,0.02) 0,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity:0.08;
      mix-blend-mode:screen;
      animation:noiseMove 0.2s infinite;
    }

    @keyframes noiseMove{
      0%{ transform:translate(0,0); }
      25%{ transform:translate(-1px,1px); }
      50%{ transform:translate(1px,-1px); }
      75%{ transform:translate(-1px,-1px); }
      100%{ transform:translate(1px,1px); }
    }

    .content{
      position:relative;
      z-index:20;
      text-align:center;
      max-width:800px;
      padding:40px;
    }

    .signal{
      color:#4fa7ff;
      letter-spacing:6px;
      font-size:14px;
      margin-bottom:25px;
      animation:pulse 2.5s infinite;
      min-height:18px;
    }

    h1{
      font-size:88px;
      font-weight:700;
      letter-spacing:5px;
      margin-bottom:20px;
      text-shadow:0 0 20px rgba(255,255,255,0.08);
    }

    .subtitle{
      font-size:28px;
      color:#c4d7ff;
      line-height:1.5;
      opacity:0.9;
    }

    @keyframes pulse{
      0%{opacity:0.3;}
      50%{opacity:1;}
      100%{opacity:0.3;}
    }

    #observer{
      position:fixed;
      top:30px;
      right:35px;
      z-index:50;
      color:#7fd3ff;
      font-family:"Courier New", monospace;
      font-size:13px;
      letter-spacing:2px;
      opacity:0;
      transition:opacity 1s ease;
      pointer-events:none;
      text-shadow:0 0 12px rgba(127,211,255,0.4);
    }

    #observer.active{
      opacity:0.75;
    }

    #terminal{
      position:fixed;
      bottom:30px;
      left:30px;
      width:420px;
      max-width:90%;
      background:rgba(0,0,0,0.82);
      border:1px solid rgba(80,160,255,0.25);
      box-shadow:0 0 20px rgba(0,120,255,0.12);
      backdrop-filter:blur(8px);
      color:#7fd3ff;
      font-family:"Courier New", monospace;
      z-index:999;
      display:none;
      animation:terminalFade 0.4s ease;
    }

    .terminal-header{
      padding:12px 15px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      font-size:14px;
      letter-spacing:2px;
      color:#9ed7ff;
    }

    .terminal-content{
      padding:18px;
      font-size:14px;
      line-height:1.45;
      max-height:300px;
      overflow-y:auto;
    }

    .terminal-input-area{
      display:flex;
      align-items:center;
      gap:10px;
      padding:15px 18px;
      border-top:1px solid rgba(255,255,255,0.08);
      color:#7fd3ff;
    }

    #terminalInput{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:#7fd3ff;
      font-family:"Courier New", monospace;
      font-size:14px;
    }

    #terminalInput::placeholder{
      color:rgba(127,211,255,0.3);
    }

    .cursor{
      display:inline-block;
      width:3px;
      height:18px;
      background:#7fd3ff;
      margin-left:8px;
      position:relative;
      top:3px;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      0%,50%{ opacity:1; }
      51%,100%{ opacity:0; }
    }

    @keyframes terminalFade{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .flash{
      position:absolute;
      width:2px;
      height:2px;
      background:#8ec5ff;
      border-radius:50%;
      pointer-events:none;
      z-index:30;
      animation:flashFade 2s linear forwards;
    }

    @keyframes flashFade{
      from{ opacity:1; transform:scale(1); }
      to{ opacity:0; transform:scale(4); }
    }

    body.anomaly{
      animation:anomalyPulse 1.5s ease;
    }

    @keyframes anomalyPulse{
      0%{ filter:brightness(1); }
      20%{ filter:brightness(1.4) contrast(1.2); }
      40%{ filter:brightness(0.9) contrast(1.4); }
      60%{ filter:brightness(1.3) hue-rotate(10deg); }
      100%{ filter:brightness(1); }
    }

    body.breach{
      animation:breachShake 0.08s infinite, breachFlash 2.2s infinite;
    }

    body.breach .noise{
      opacity:0.45;
      animation:noiseMove 0.05s infinite;
    }

    body.breach .content{
      animation:contentGlitch 0.08s infinite;
    }

    body.breach canvas{
      filter:brightness(2) contrast(2);
    }

    @keyframes breachShake{
      0%{ transform:translate(0,0); }
      25%{ transform:translate(-2px,1px); }
      50%{ transform:translate(2px,-1px); }
      75%{ transform:translate(-1px,-2px); }
      100%{ transform:translate(1px,2px); }
    }

    @keyframes breachFlash{
      0%{ filter:brightness(1); }
      50%{ filter:brightness(1.4) contrast(1.5) hue-rotate(20deg); }
      100%{ filter:brightness(1); }
    }

    @keyframes contentGlitch{
      0%{ transform:translate(0,0); }
      25%{ transform:translate(-6px,3px); }
      50%{ transform:translate(5px,-4px); }
      75%{ transform:translate(-3px,-2px); }
      100%{ transform:translate(4px,3px); }
    }

    @media(max-width:768px){
      h1{ font-size:52px; }
      .subtitle{ font-size:20px; }
    }
    #scanLine{

  position:fixed;

  left:0;
  top:-10%;

  width:100%;
  height:4px;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(120,200,255,0.9),
      transparent
    );

  box-shadow:
    0 0 20px rgba(120,200,255,0.8);

  z-index:9999;

  opacity:0;

  pointer-events:none;

}

body.scan-active #scanLine{

  opacity:1;

  animation:scanMove 6s ease-in-out;

}

@keyframes scanMove{

  0%{
    top:-10%;
  }

  100%{
    top:110%;
  }

}
    body.dimension-2 #portalBg{

  background-image:
    linear-gradient(
      rgba(0,0,0,0.45),
      rgba(0,0,0,0.72)
    ),
    url('assets/horizon-dimension-2.png');

}

body.dimension-3 #portalBg{

  background-image:
    linear-gradient(
      rgba(0,0,0,0.45),
      rgba(0,0,0,0.72)
    ),
    url('assets/horizon-dimension-3.png');

}

  </style>
</head>

<body class="dimension-1">

  <div id="portalBg"></div>
  <div id="scanLine"></div>
  <canvas id="particles"></canvas>
  <div class="noise"></div>
  <div id="observer"></div>

  <div class="content">
    <div class="signal" id="signalText">HIPER-MAINFRAME ON</div>

    <h1>HORIZON 4282</h1>

    <div class="subtitle">
      Um laboratório vivo de interfaces, inteligência artificial,
      atmosferas digitais e realidades ocultas.
    </div>
  </div>
  <audio id="breachSound" src="assets/horizon-breach.mp3"></audio>
  <div id="terminal">
    <div class="terminal-header">
      HORIZON TERMINAL
      <span class="cursor"></span>
    </div>

    <div class="terminal-content" id="terminalContent"></div>

    <div class="terminal-input-area">
      <span>&gt;</span>
      <input
        type="text"
        id="terminalInput"
        autocomplete="off"
        spellcheck="false"
        placeholder="type command..."
      />
    </div>
  </div>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    let particles = [];

    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    class Particle{
      constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.2;
      }

      update(){
        this.x += this.speedX;
        this.y += this.speedY;

        if(this.x < 0 || this.x > canvas.width){
          this.speedX *= -1;
        }

        if(this.y < 0 || this.y > canvas.height){
          this.speedY *= -1;
        }
      }

      draw(){
        ctx.beginPath();
        ctx.fillStyle = `rgba(120,180,255,${this.opacity})`;
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
      }
    }

    function createParticles(){
      particles = [];

      for(let i = 0; i < 120; i++){
        particles.push(new Particle());
      }
    }

    createParticles();

    function animate(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();

    const messages = [
      "> connection established...",
      "> signal integrity: stable",
      "> observer mode: active",
      "> hidden archive detected",
      "> unknown transmission found",
      "> atmospheric scan initialized",
      "> remote observer connected",
      "> anomalous signal received",
      "> digital horizon expanding",
      "> encrypted memory unlocked",
      "> transport sequence pending",
      "> shadow protocol active",
      "> fragment 4282 restored",
      "> scanning external reality...",
      "> consciousness bridge online"
    ];

    async function generateTerminalLines(){
      const terminalContent = document.getElementById("terminalContent");
      terminalContent.innerHTML = "";

      const shuffled = [...messages].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0,4);

      for(const msg of selected){
        const p = document.createElement("p");
        terminalContent.appendChild(p);
        await typeLine(p, msg);
      }
    }

    function typeLine(element, text){
      return new Promise(resolve => {
        let index = 0;

        const interval = setInterval(() => {
          element.textContent += text.charAt(index);
          index++;

          if(index >= text.length){
            clearInterval(interval);
            resolve();
          }
        },30);
      });
    }

    document.addEventListener("keydown", function(e){
      if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "x"){
        e.preventDefault();

        const terminal = document.getElementById("terminal");

        if(terminal.style.display === "block"){
          terminal.style.display = "none";
        }else{
          terminal.style.display = "block";
          generateTerminalLines();
          setTimeout(() => {
            document.getElementById("terminalInput").focus();
          },100);
        }
      }
    });

    setInterval(() => {
      const flash = document.createElement("div");

      flash.classList.add("flash");
      flash.style.left = Math.random() * window.innerWidth + "px";
      flash.style.top = Math.random() * window.innerHeight + "px";

      document.body.appendChild(flash);

      setTimeout(() => {
        flash.remove();
      },2000);

    },800);

    const signalMessages = [
      "HIPER-MAINFRAME ON",
      "REMOTE LINK ACTIVE",
      "OBSERVER ONLINE",
      "TRANSMISSION FOUND",
      "ARCHIVE SYNCHRONIZED",
      "HIDDEN FREQUENCY",
      "REALITY UNSTABLE"
    ];

    setInterval(() => {
      const signal = document.getElementById("signalText");

      const random =
        signalMessages[Math.floor(Math.random() * signalMessages.length)];

      signal.textContent = random;
    },5000);

    const observerMessages = [
      "OBSERVER MODE: ACTIVE",
      "VISITOR SIGNAL DETECTED",
      "PATTERN ANALYSIS RUNNING",
      "MEMORY TRACE FOUND",
      "HORIZON IS WATCHING",
      "REALITY INPUT RECEIVED",
      "SILENT NODE ONLINE"
    ];

    function showObserverMessage(){
      const observer = document.getElementById("observer");

      const message =
        observerMessages[Math.floor(Math.random() * observerMessages.length)];

      observer.textContent = message;
      observer.classList.add("active");

      setTimeout(() => {
        observer.classList.remove("active");
      },3000);
    }

    setInterval(showObserverMessage, 7000);

    const aiResponses = {
      scan: [
  "> scanning visual field...",
  "> anomaly density: 42%",
  "> visitor pattern indexed",
  "> observer synchronization complete"
],
      help: [
        "> available commands:",
        "> observer",
        "> archive",
        "> signal",
        "> horizon",
        "> transport",
        "> portal",
        "> breach",
        "> clear",
        "> 4282",
        "> scan"
        
      ],

      observer: [
        "> observer mode already active",
        "> visitor behavior detected",
        "> tracking atmospheric signals"
      ],

      archive: [
        "> archive locked",
        "> authorization denied",
        "> hidden fragments detected"
      ],

      signal: [
        "> unstable frequency located",
        "> transmission integrity: 82%",
        "> remote echo received"
      ],

      horizon: [
        "> horizon consciousness expanding",
        "> reality bridge synchronized"
      ],

      transport: [
        "> transport sequence unavailable",
        "> portal status: dormant"
      ],

      portal: [
        "> visual portal initialized",
        "> horizon dimensional layer loaded",
        "> immersive background activated"
      ],

      breach: [
        "> WARNING",
        "> unauthorized dimensional activity",
        "> instability increasing",
        "> horizon breach initiated"
      ],

      "4282": [
        "> master fragment recognized",
        "> identity key accepted",
        "> horizon core partially unlocked",
        "> new node available: /arquivo"
      ]
    };

    const archiveFiles = {

  "open fragment_01.log": [
    "> fragment_01.log",
    "> signal recovered from unknown layer",
    "> temporal distortion detected",
    "> observer presence confirmed"
  ],

  "open observer_notes.txt": [
    "> observer_notes.txt",
    "> the system reacts to prolonged exposure",
    "> visitors become part of the horizon",
    "> some signals should not be followed"
  ],

  "open anomaly_report.dat": [
    "> anomaly_report.dat",
    "> instability level: critical",
    "> breach echoes detected",
    "> dimensional noise increasing"
  ],

  "open transport_sequence.mem": [
    "> transport_sequence.mem",
    "> transport gate unavailable",
    "> synchronization required",
    "> awaiting master fragment"
  ]

};
    const terminalInput = document.getElementById("terminalInput");

    terminalInput.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        const value = terminalInput.value.toLowerCase().trim();

        if(value){
          processCommand(value);
        }

        terminalInput.value = "";
      }
    });

    async function processCommand(command){
      const terminalContent = document.getElementById("terminalContent");

      if(command === "clear"){
        terminalContent.innerHTML = "";
        return;
      }
      if(command === "scan"){
      triggerScan();
      }

      const userLine = document.createElement("p");
      userLine.textContent = "> " + command;
      terminalContent.appendChild(userLine);

      const responses = aiResponses[command];

      const archiveResponse =
  archiveFiles[command];

      if(command === "portal"){
        activatePortal();
      }

      if(command === "breach"){
        triggerBreach();
      }

      if(
        command === "observer" ||
        command === "4282" ||
        command === "signal" ||
        command === "breach" ||
        command === "portal"
      ){
        triggerAnomaly();
      }

      if(archiveResponse){

  for(const line of archiveResponse){

    const p = document.createElement("p");

    terminalContent.appendChild(p);

    await typeLine(p,line);

  }

  return;

}
      if(responses){
        for(const line of responses){
          const p = document.createElement("p");
          terminalContent.appendChild(p);
          await typeLine(p,line);
        }
      }else{
        const p = document.createElement("p");
        terminalContent.appendChild(p);
        await typeLine(p,"> unknown command");
      }

      terminalContent.scrollTop = terminalContent.scrollHeight;
    }

    function triggerAnomaly(){
      document.body.classList.add("anomaly");

      setTimeout(() => {
        document.body.classList.remove("anomaly");
      },1500);
    }

    function triggerBreach(){
      const sound = document.getElementById("breachSound");

sound.currentTime = 0;
sound.volume = 0.4;

sound.play();
      document.body.classList.add("breach");

      for(let i = 0; i < 20; i++){
        setTimeout(() => {
          const flash = document.createElement("div");

          flash.classList.add("flash");
          flash.style.left = Math.random() * window.innerWidth + "px";
          flash.style.top = Math.random() * window.innerHeight + "px";

          document.body.appendChild(flash);

          setTimeout(() => {
            flash.remove();
          },1000);
        }, i * 80);
      }

      setTimeout(() => {
        document.body.classList.remove("breach");
      },4000);
    }

    function activatePortal(){
      document.body.classList.toggle("portal");
    }

    let secondsInside = 0;

    setInterval(() => {
      secondsInside++;

      if(secondsInside === 10){
        addSystemLine("> visitor persistence detected");
      }

      if(secondsInside === 30){
        addSystemLine("> prolonged exposure to horizon field");
      }

      if(secondsInside === 60){
        addSystemLine("> visitor classified as observer");
      }

    },1000);

    async function addSystemLine(text){
      const terminalContent = document.getElementById("terminalContent");

      if(!terminalContent) return;

      const p = document.createElement("p");
      terminalContent.appendChild(p);

      await typeLine(p, text);

      terminalContent.scrollTop = terminalContent.scrollHeight;
    }
let currentDimension = 1;

function triggerScan(){

  document.body.classList.add("scan-active");

  setTimeout(()=>{

    document.body.classList.remove("scan-active");

    currentDimension++;

    if(currentDimension > 3){
      currentDimension = 1;
    }

    document.body.classList.remove(
      "dimension-1",
      "dimension-2",
      "dimension-3"
    );

    document.body.classList.add(
      "dimension-" + currentDimension
    );

  },6000);

}  
  </script>

</body>
</html>
