<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon 4282</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #1b2a4a 0%, #05070d 65%, #000 100%);
      color: #e8f1ff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 720px;
      padding: 40px;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #9fb8d9;
      margin-bottom: 30px;
    }

    .signal {
      font-size: 0.9rem;
      color: #6ee7ff;
      letter-spacing: 3px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="signal">SIGNAL DETECTED</div>
    <h1>HORIZON 4282</h1>
    <p class="subtitle">
      Um laboratório vivo de interfaces, inteligência artificial,
      atmosferas digitais e realidades ocultas.
    </p>
  </div>
</body>
</html>
