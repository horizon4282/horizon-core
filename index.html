<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizon 4282</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    #terminal{

  position:fixed;

  bottom:30px;
  left:30px;

  width:420px;
  max-width:90%;

  background:rgba(0,0,0,0.82);

  border:1px solid rgba(80,160,255,0.25);

  box-shadow:
  0 0 20px rgba(0,120,255,0.12);

  backdrop-filter:blur(8px);

  color:#7fd3ff;

  font-family:Courier New, monospace;

  z-index:999;

  display:none;

  animation:terminalFade 0.4s ease;
  padding:0 0 50px 0;
}

.terminal-header{

  padding:12px 15px;

  border-bottom:1px solid rgba(255,255,255,0.08);

  font-size:13px;

  letter-spacing:2px;

  color:#9ed7ff;
}

.terminal-content{

  padding:18px;

  font-size:14px;

  line-height:1.9;
}

#terminal p{
  padding-left:50px;
  color:yellow;
}

@keyframes terminalFade{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}
    
    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:
      radial-gradient(circle at center,
      #132445 0%,
      #09101f 55%,
      #000 100%);

      font-family: Arial, Helvetica, sans-serif;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    canvas{
      position:absolute;
      inset:0;
    }

.noise{
  position:absolute;
  inset:0;

  background-image:
  repeating-radial-gradient(
    circle at center,
    rgba(255,255,255,0.02) 0,
    rgba(255,255,255,0.015) 1px,
    transparent 1px,
    transparent 4px
  );

  opacity:0.08;

  mix-blend-mode:screen;

  animation:noiseMove 0.2s infinite;
}

@keyframes noiseMove{

  0%{
    transform:translate(0,0);
  }

  25%{
    transform:translate(-1px,1px);
  }

  50%{
    transform:translate(1px,-1px);
  }

  75%{
    transform:translate(-1px,-1px);
  }

  100%{
    transform:translate(1px,1px);
  }

}

    .content{
      position:relative;
      z-index:10;
      text-align:center;
      max-width:800px;
      padding:40px;
    }

    .signal{
      color:#4fa7ff;
      letter-spacing:6px;
      font-size:14px;
      margin-bottom:25px;
      animation:pulse 2.5s infinite;
    }

    h1{
      font-size:88px;
      font-weight:700;
      letter-spacing:5px;
      margin-bottom:20px;
      text-shadow:0 0 20px rgba(255,255,255,0.08);
    }

    .subtitle{
      font-size:28px;
      color:#c4d7ff;
      line-height:1.5;
      opacity:0.9;
    }

    @keyframes pulse{
      0%{opacity:0.3;}
      50%{opacity:1;}
      100%{opacity:0.3;}
    }

    @media(max-width:768px){

      h1{
        font-size:52px;
      }

      .subtitle{
        font-size:20px;
      }

    }

    .cursor{

  display:inline-block;

  width:10px;
  height:18px;

  background:#7fd3ff;

  margin-left:8px;

  animation:blink 1s infinite;
}

@keyframes blink{

  0%,50%{
    opacity:1;
  }

  51%,100%{
    opacity:0;
  }

}

.flash{

  position:absolute;

  width:2px;
  height:2px;

  background:#8ec5ff;

  border-radius:50%;

  pointer-events:none;

  animation:flashFade 2s linear forwards;
}

@keyframes flashFade{

  from{
    opacity:1;
    transform:scale(1);
  }

  to{
    opacity:0;
    transform:scale(4);
  }

}
  </style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="noise"></div>

<div class="content">

  <div class="signal">
  
  </div>

<div class="signal" id="signalText">
 
</div>
  
  <h1>HORIZON 4282</h1>

  <div class="subtitle">
    Um laboratório vivo de interfaces, inteligência artificial,
    atmosferas digitais e realidades ocultas.
  </div>

</div>


<div id="terminal">

<div class="terminal-header">
  HORIZON TERMINAL
  <span class="cursor"></span>
</div>

  
<div class="terminal-content" id="terminalContent"></div>

    <p>  > connection established...</p>
    <p>  > signal integrity: stable</p>
    <p>  > archive status: hidden</p>
    <p>  > observer mode: active</p>

  </div>

</div>
<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);
resize();

class Particle{

  constructor(){

    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;

    this.size = Math.random() * 2 + 0.5;

    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;

    this.opacity = Math.random() * 0.5 + 0.2;

  }

  update(){

    this.x += this.speedX;
    this.y += this.speedY;

    if(this.x < 0 || this.x > canvas.width){
      this.speedX *= -1;
    }

    if(this.y < 0 || this.y > canvas.height){
      this.speedY *= -1;
    }

  }

  draw(){

    ctx.beginPath();

    ctx.fillStyle = `rgba(120,180,255,${this.opacity})`;

    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

    ctx.fill();

  }

}

function createParticles(){

  particles = [];

  for(let i = 0; i < 120; i++){

    particles.push(new Particle());

  }

}

createParticles();

function animate(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(particle => {

    particle.update();
    particle.draw();

  });

  requestAnimationFrame(animate);

}

animate();

const messages = [

  "  > connection established...",
  "  > signal integrity: stable",
  "  > observer mode: active",
  "  > hidden archive detected",
  "  > unknown transmission found",
  "  > atmospheric scan initialized",
  "  > remote observer connected",
  "  > anomalous signal received",
  "  > digital horizon expanding",
  "  > encrypted memory unlocked",
  "  > transport sequence pending",
  "  > shadow protocol active",
  "  > fragment 4282 restored",
  "  > scanning external reality...",
  "  > consciousness bridge online"

];

function generateTerminalLines(){

  const terminalContent =
    document.getElementById("terminalContent");

  terminalContent.innerHTML = "";

  const shuffled =
    messages.sort(() => 0.5 - Math.random());

  const selected = shuffled.slice(0,4);

  selected.forEach(msg => {

    const p = document.createElement("p");

    p.textContent = msg;

    terminalContent.appendChild(p);

  });

}
document.addEventListener("keydown", function(e){

  if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "x"){

    e.preventDefault();

    const terminal = document.getElementById("terminal");

    if(!terminal) return;

   if(terminal.style.display === "block"){

  terminal.style.display = "none";

}else{

  generateTerminalLines();

  terminal.style.display = "block";

}
  }

});



setInterval(()=>{

  const flash = document.createElement("div");

  flash.classList.add("flash");

  flash.style.left =
    Math.random() * window.innerWidth + "px";

  flash.style.top =
    Math.random() * window.innerHeight + "px";

  document.body.appendChild(flash);

  setTimeout(()=>{

    flash.remove();

  },2000);

},800);


  const signalMessages = [

  "HIPER-MAINFRAME ON",
  "REMOTE LINK ACTIVE",
  "OBSERVER ONLINE",
  "TRANSMISSION FOUND",
  "ARCHIVE SYNCHRONIZED",
  "HIDDEN FREQUENCY",
  "REALITY UNSTABLE"

];

setInterval(()=>{

  const signal =
    document.getElementById("signalText");

  const random =
    signalMessages[
      Math.floor(Math.random() * signalMessages.length)
    ];

  signal.textContent = random;

},5000);
</script>



  
</body>
</html>
